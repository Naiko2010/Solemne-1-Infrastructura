# Full-stack local: abre Docker Desktop antes de ejecutar.
#   .\scripts\docker-dev-up.ps1
#   o: docker compose -f docker-compose.dev.yml up --build -d
# UI: http://localhost:5173  |  API: http://localhost:8000  |  Docs: http://localhost:8000/api/docs
#
# El backend monta ./src y usa el .env de esta carpeta (SUPABASE_*, JWT_SECRET, etc.).

name: delivery-dev

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-backend-dev
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_DEBUG: "true"
      PYTHONUNBUFFERED: "1"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:5174,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://host.docker.internal:5173,http://host.docker.internal:5174"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: >
      python -m uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    networks:
      - delivery-network
    restart: unless-stopped
    # Desarrollo: root evita choques de permisos con volúmenes en Windows/WSL2
    user: "0:0"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ../Delivery-Custom-App-INGSW2-FRONTEND
      dockerfile: Dockerfile.dev
    container_name: delivery-frontend-dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_DEV_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    env_file:
      - path: ../Delivery-Custom-App-INGSW2-FRONTEND/.env
        required: false
    volumes:
      - ../Delivery-Custom-App-INGSW2-FRONTEND:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - delivery-network
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:

networks:
  delivery-network:
    driver: bridge
